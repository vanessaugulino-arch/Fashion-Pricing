kind = "mobile"
previewPath = "/mobile/"
title = "TFO Pricing Mobile"
version = "1.0.0"
id = "artifacts/tfo-pricing-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25734

[services.development]
run = "pnpm --filter @workspace/tfo-pricing-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tfo-pricing-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tfo-pricing-mobile", "run", "serve" ]

[services.env]
PORT = "25734"
BASE_PATH = "/mobile/"
